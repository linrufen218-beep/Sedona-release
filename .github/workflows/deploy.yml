name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请将其改为 master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 默认的打包输出目录
          branch: gh-pages # 部署到的分支，GitHub Pages 通常使用这个分支
